<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>NEX.Online</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        background: #000;
      }
      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }
      #error {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-family: system-ui, sans-serif;
        font-size: 1.25rem;
      }
    </style>
  </head>
  <body>
    <iframe
      id="yt-player"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
        fullscreen;
      "
      allowfullscreen
      referrerpolicy="strict-origin-when-cross-origin"
    ></iframe>
    <script>
      const u = new URL(location.href);
      const v = u.searchParams.get("v");
      const reelId = u.searchParams.get("reelId");
      const trackId = u.searchParams.get("trackId");

      if (v) {
        const base =
          "https://www.youtube-nocookie.com/embed/" + encodeURIComponent(v);
        const params = new URLSearchParams({
          enablejsapi: "1",
          rel: "0",
          modestbranding: u.searchParams.get("modestbranding") || "0",
          playsinline: u.searchParams.get("playsinline") || "1",
          autoplay: u.searchParams.get("autoplay") || "0",
          mute: u.searchParams.get("mute") || "0",
          controls: u.searchParams.get("controls") || "1",
          origin: location.origin,
        });
        document.getElementById("yt-player").src = `${base}?${params}`;
      } else if (reelId || trackId) {
        const query = u.searchParams.toString();
        window.location.href = `nex://app/?${query}`;
      } else {
        console.error("No valid parameters found.");
        const err = document.createElement("div");
        err.id = "error";
        err.textContent = "Invalid or missing parameters.";
        document.body.appendChild(err);
      }
    </script>
  </body>
</html>
